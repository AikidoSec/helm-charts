name: Release & Publish

on:
  push:
    tags:
      - 'broker-client-*'
      - 'kubernetes-agent-*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: open-source-releaser
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Resolve chart from tag
        id: chart
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ "$(git cat-file -t "$tag")" != "tag" ]]; then
            echo "::error::Release tag '$tag' must be an annotated tag"
            exit 1
          fi

          case "$tag" in
            broker-client-*)
              chart_dir="broker-client"
              ;;
            kubernetes-agent-*)
              chart_dir="kubernetes-agent"
              ;;
            *)
              echo "::error::Unsupported release tag '$tag'"
              exit 1
              ;;
          esac

          chart_name="$(awk -F': *' '$1 == "name" { gsub(/"/, "", $2); print $2; exit }' "$chart_dir/Chart.yaml")"
          chart_version="$(awk -F': *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' "$chart_dir/Chart.yaml")"
          expected_tag="${chart_name}-${chart_version}"

          if [[ "$tag" != "$expected_tag" ]]; then
            echo "::error::Release tag '$tag' does not match Chart.yaml tag '$expected_tag'"
            exit 1
          fi

          echo "chart_dir=$chart_dir" >> "$GITHUB_OUTPUT"

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          install_only: true
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          cr package '${{ steps.chart.outputs.chart_dir }}' --package-path .cr-release-packages

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_packaging: true
          skip_existing: true
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "broker-client.fullname" . }}
  labels:
    {{- include "broker-client.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLIENT_SECRET: {{ .Values.config.clientSecret | required "config.clientSecret is required" | quote }}
  ALLOWED_INTERNAL_SUBNETS: {{ .Values.config.allowedInternalSubnets | quote }}
  {{- if .Values.config.dnsServers }}
  DNS_SERVERS: {{ .Values.config.dnsServers | quote }}
  {{- end }}
  {{- if .Values.config.httpProxy }}
  HTTP_PROXY: {{ .Values.config.httpProxy | quote }}
  {{- end }}
  {{- if .Values.config.httpsProxy }}
  HTTPS_PROXY: {{ .Values.config.httpsProxy | quote }}
  {{- end }}
  {{- if .Values.config.allProxy }}
  ALL_PROXY: {{ .Values.config.allProxy | quote }}
  {{- end }}
  {{- if .Values.config.brokerTargetUrl }}
  BROKER_TARGET_URL: {{ .Values.config.brokerTargetUrl | quote }}
  {{- end }}
  {{- if .Values.config.customCaBundleContent }}
  NODE_EXTRA_CA_CERTS: "/certs/custom-ca.crt"
  {{- end }}
  {{- if .Values.config.mtlsPemContent }}
  MTLS_PEM_PATH: "/certs/client.pem"
  {{- end }}
  {{- if .Values.config.mtlsCaContent }}
  MTLS_CA_PATH: "/certs/internal-ca.crt"
  {{- end }}
  {{- if .Values.config.nodeTlsRejectUnauthorized }}
  NODE_TLS_REJECT_UNAUTHORIZED: {{ .Values.config.nodeTlsRejectUnauthorized | quote }}
  {{- end }}
  {{- if .Values.config.forceWebsocket }}
  FORCE_WEBSOCKET: {{ .Values.config.forceWebsocket | quote }}
  {{- end }}
  {{- if .Values.config.noProxy }}
  NO_PROXY: {{ .Values.config.noProxy | quote }}
  {{- end }}
{{- if .Values.config.customCaBundleContent }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "broker-client.fullname" . }}-ca-bundle
  labels:
    {{- include "broker-client.labels" . | nindent 4 }}
type: Opaque
data:
  custom-ca.crt: {{ .Values.config.customCaBundleContent | b64enc }}
{{- end }}
{{- if .Values.config.mtlsPemContent }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "broker-client.fullname" . }}-mtls-pem
  labels:
    {{- include "broker-client.labels" . | nindent 4 }}
type: Opaque
data:
  client.pem: {{ .Values.config.mtlsPemContent | b64enc }}
{{- end }}
{{- if .Values.config.mtlsCaContent }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "broker-client.fullname" . }}-mtls-ca
  labels:
    {{- include "broker-client.labels" . | nindent 4 }}
type: Opaque
data:
  internal-ca.crt: {{ .Values.config.mtlsCaContent | b64enc }}
{{- end }}

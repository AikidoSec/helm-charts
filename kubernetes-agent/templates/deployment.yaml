apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-agent.fullname" . }}
  labels:
    {{- include "kubernetes-agent.labels" . | nindent 4 }}
spec:
  replicas: {{- if eq .Values.sbomCollector.enabled true }} 1 {{- else }} 0 {{- end }}
  selector:
    matchLabels:
      {{- include "kubernetes-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if .Values.podAnnotations }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        {{- end }}
      labels:
        aikido-security: kubernetes-agent
        {{- include "kubernetes-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubernetes-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-health-probe-bind-address=:{{ .Values.healthCheck.port }}"]
          env:
            - name: AGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GOMEMLIMIT
              {{- /* Set Go memory limit to 90% of container memory limit (min 100 MiB) */}}
              {{- /* 1. Convert memory limit to MiB (Gi -> MiB * 1024, Mi -> MiB * 1) */}}
              {{- /* 2. Calculate 90% with 100 MiB minimum */}}
              {{- /* 3. Use GiB if result >= 1024 MiB, otherwise use MiB */}}
              value: "{{ $memMiB := 0 }}{{ if contains "Gi" .Values.resources.limits.memory }}{{ $memMiB = mul (.Values.resources.limits.memory | replace "Gi" "" | int) 1024 }}{{ else }}{{ $memMiB = (.Values.resources.limits.memory | replace "Mi" "" | int) }}{{ end }}{{ $goMemLimit := max 100 (mul (div $memMiB 10) 9) }}{{ if ge $goMemLimit 1024 }}{{ div $goMemLimit 1024 }}GiB{{ else }}{{ $goMemLimit }}MiB{{ end }}"
          ports:
            - name: health
              containerPort: {{ .Values.healthCheck.port }}
              protocol: TCP
            - containerPort: 81
              name: api-port
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: "/etc/kubernetes-agent"
              readOnly: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "kubernetes-agent.fullname" . }}

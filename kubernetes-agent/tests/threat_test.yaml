suite: threat detection runtime

tests:
  # --- detection config (our template) ---

  - it: should not render when disabled
    set:
      threatDetection.enabled: false
    template: templates/threat-detection/falco-detection-config.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: detection config should send events to the agent HTTP endpoint
    set:
      threatDetection.enabled: true
    template: templates/threat-detection/falco-detection-config.yaml
    asserts:
      - matchRegex:
          path: data["http-output.yaml"]
          pattern: 'url: "http://RELEASE-NAME-kubernetes-agent:8241/detection"'

  - it: detection config URL should follow threatDetection.port
    set:
      threatDetection.enabled: true
      threatDetection.port: 9999
    template: templates/threat-detection/falco-detection-config.yaml
    asserts:
      - matchRegex:
          path: data["http-output.yaml"]
          pattern: 'url: "http://RELEASE-NAME-kubernetes-agent:9999/detection"'

  - it: detection config should use httpOutputUrl override when set
    set:
      threatDetection.enabled: true
      threatDetection.httpOutputUrl: "http://my-custom-agent:7777/detection"
    template: templates/threat-detection/falco-detection-config.yaml
    asserts:
      - matchRegex:
          path: data["http-output.yaml"]
          pattern: 'url: "http://my-custom-agent:7777/detection"'

  # --- Falco DaemonSet (subchart) ---

  - it: daemonset should be named with threat-detection suffix
    set:
      threatDetection.enabled: true
    template: charts/falco/templates/daemonset.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubernetes-agent-threat-detection

  - it: daemonset should tolerate control-plane nodes
    set:
      threatDetection.enabled: true
    template: charts/falco/templates/daemonset.yaml
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            effect: NoSchedule
            key: node-role.kubernetes.io/control-plane
      - contains:
          path: spec.template.spec.tolerations
          content:
            effect: NoSchedule
            key: node-role.kubernetes.io/master

  - it: daemonset should use rolling update strategy
    set:
      threatDetection.enabled: true
    template: charts/falco/templates/daemonset.yaml
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: RollingUpdate

  # --- Falco ConfigMap (subchart) ---

  - it: falco configmap should enable JSON output
    set:
      threatDetection.enabled: true
    template: charts/falco/templates/configmap.yaml
    asserts:
      - matchRegex:
          path: data["falco.yaml"]
          pattern: "json_output: true"
      - matchRegex:
          path: data["falco.yaml"]
          pattern: "json_include_output_fields_property: true"
      - matchRegex:
          path: data["falco.yaml"]
          pattern: "json_include_tags_property: true"

  # --- agent deployment ---

  - it: agent deployment should include threat detection env vars when enabled
    set:
      threatDetection.enabled: true
    template: templates/agent/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: THREAT_DETECTION_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: THREAT_PROXY_PORT
            value: "8241"

  - it: agent deployment should omit threat detection detail env vars when disabled
    set:
      threatDetection.enabled: false
    template: templates/agent/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: THREAT_DETECTION_ENABLED
            value: "false"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: THREAT_PROXY_PORT

  # --- agent service ---

  - it: service should expose td-port port when enabled
    set:
      threatDetection.enabled: true
    template: templates/agent/service.yaml
    asserts:
      - contains:
          path: spec.ports
          content:
            name: td-port
            protocol: TCP
            port: 8241
            targetPort: td-port

  - it: service should not expose td-port port when disabled
    set:
      threatDetection.enabled: false
    template: templates/agent/service.yaml
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: td-port

  # --- k8s-metacollector (k8smeta plugin sidecar) ---

  - it: k8s-metacollector should be deployed when threat detection is enabled
    set:
      threatDetection.enabled: true
    template: charts/falco/charts/k8s-metacollector/templates/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1

  # --- network policy ---

  - it: network policy should allow ingress from falco pods when enabled
    set:
      threatDetection.enabled: true
    template: templates/agent/network_policy.yaml
    asserts:
      - contains:
          path: spec.ingress
          content:
            from:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/component: kubernetes-agent-threat-detection
            ports:
              - protocol: TCP
                port: 8241

  - it: network policy should not include threat detection rule when disabled
    set:
      threatDetection.enabled: false
    template: templates/agent/network_policy.yaml
    asserts:
      - notContains:
          path: spec.ingress
          content:
            from:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/component: kubernetes-agent-threat-detection
